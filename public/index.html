<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard</title>
    <meta name="description" content="Admin dashboard with live stats, charts, and a sortable data table.">
    <meta name="theme-color" content="#0b0d12">
    <link rel="icon" href="data:image/svg+xml,<svg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20100%20100%22><rect%20x=%2212%22%20y=%2212%22%20width=%2276%22%20height=%2276%22%20rx=%2218%22%20fill=%22%236366f1%22/></svg>">
    <!-- Social share preview (Open Graph + Twitter). When you brand this app, update the
         title/description here and swap og:image & twitter:image for your own 1200x630 image. -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Dashboard">
    <meta property="og:description" content="Admin dashboard with live stats, charts, and a sortable data table.">
    <meta property="og:image" content="https://vibekit.bot/public/og-vibekit.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Dashboard">
    <meta name="twitter:description" content="Admin dashboard with live stats, charts, and a sortable data table.">
    <meta name="twitter:image" content="https://vibekit.bot/public/og-vibekit.png">
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>
<aside class="sidebar" id="sidebar">
  <div class="brand">◆ Dashboard</div>
  <nav>
    <a class="nav-item active" href="#overview">Overview</a>
    <a class="nav-item" href="#users">Users</a>
    <a class="nav-item" href="#revenue">Revenue</a>
    <a class="nav-item" href="#settings">Settings</a>
  </nav>
  <div class="user-chip">
    <div class="avatar">YOU</div>
    <div>
      <div class="user-name">Admin</div>
      <div class="user-role">Owner</div>
    </div>
  </div>
</aside>

<main class="content">
  <header class="topbar">
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">☰</button>
    <h1>Overview</h1>
    <div class="topbar-actions">
      <button class="icon-btn" title="Notifications" aria-label="Notifications">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 8a6 6 0 0112 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 003.4 0"/></svg>
      </button>
    </div>
  </header>

  <section class="stat-grid" id="stat-grid"></section>

  <section class="chart-card">
    <div class="chart-head">
      <h2>Revenue & signups — last 30 days</h2>
      <div class="legend">
        <span><i class="dot dot-revenue"></i> Revenue</span>
        <span><i class="dot dot-signups"></i> Signups</span>
      </div>
    </div>
    <canvas id="chart" height="220"></canvas>
  </section>

  <section class="table-card">
    <div class="table-head">
      <h2>Users</h2>
      <input type="search" id="user-search" placeholder="Filter rows…" />
    </div>
    <div class="table-wrap">
      <table class="users-table">
        <thead>
          <tr>
            <th data-sort="name" tabindex="0" role="columnheader" aria-sort="none">Name</th>
            <th data-sort="email" tabindex="0" role="columnheader" aria-sort="none">Email</th>
            <th data-sort="plan" tabindex="0" role="columnheader" aria-sort="none">Plan</th>
            <th data-sort="status" tabindex="0" role="columnheader" aria-sort="none">Status</th>
            <th data-sort="mrr" tabindex="0" role="columnheader" aria-sort="none">MRR</th>
            <th data-sort="createdAt" tabindex="0" role="columnheader" aria-sort="none">Joined</th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
